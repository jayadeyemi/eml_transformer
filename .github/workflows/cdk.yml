name: CDK Deployment Checks

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      deployment_config:
        description: Deployment config path
        required: true
        default: configs/deployments/aws-dev.yaml
      deploy:
        description: Deploy after synth
        required: true
        type: boolean
        default: false
      image_tag:
        description: Docker image tag to use (defaults to commit SHA)
        required: false

env:
  AWS_REGION: us-east-1
  DEPLOYMENT_CONFIG: ${{ inputs.deployment_config || '' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      selected_environment: ${{ steps.selected_meta.outputs.environment }}
      selected_region: ${{ steps.selected_meta.outputs.region }}
      selected_runtime_config_path: ${{ steps.selected_meta.outputs.runtime_config_path }}
      selected_stack_name: ${{ steps.selected_meta.outputs.stack_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[aws,test]"
          python -m pip install -r infra/cdk/requirements.txt

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Run unit tests
        run: python -m pytest tests/unit -v

      - name: Run contract tests
        run: python -m pytest tests/contract -v

      - name: Run AWS contract tests
        run: python -m pytest tests/aws_contract -v

      - name: Validate deployment config
        run: eml_transformer config-validate-all --directory configs/deployments

      - name: Render deployment matrices
        run: |
          for deployment in configs/deployments/*.yaml; do
            eml_transformer deployment-matrix --deployment "$deployment"
          done

      - name: CDK synth configured deployments
        working-directory: infra/cdk
        run: |
          python - <<'PY' > /tmp/cdk-deployments.txt
          from pathlib import Path
          from eml_transformer.deployment.config import load_deployment_config

          repo_root = Path("../..").resolve()
          for path in sorted((repo_root / "configs" / "deployments").glob("*.yaml")):
              loaded = load_deployment_config(path)
              if loaded.config.get("infra", {}).get("engine") == "cdk":
                  print(path.relative_to(repo_root).as_posix())
          PY

          while IFS= read -r deployment; do
            echo "Synthesizing ${deployment}"
            cdk synth -c deployment_config="$deployment"
          done < /tmp/cdk-deployments.txt

      - name: Read selected deployment metadata
        id: selected_meta
        if: github.event_name == 'workflow_dispatch'
        run: |
          python - <<'PY'
          import os
          from eml_transformer.deployment.config import (
              deployment_metadata,
              load_deployment_config,
          )

          deployment = os.environ["DEPLOYMENT_CONFIG"]
          loaded = load_deployment_config(deployment)
          metadata = deployment_metadata(loaded.config)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              for key in (
                  "environment",
                  "region",
                  "runtime_config_path",
                  "stack_name",
              ):
                  print(f"{key}={metadata.get(key, '')}", file=out)
          PY

      - name: CDK diff (pull requests only)
        if: github.event_name == 'pull_request'
        working-directory: infra/cdk
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          # Diff is best-effort; requires AWS credentials. Skip gracefully if not configured.
          if [ -n "$AWS_DEPLOY_ROLE_ARN" ]; then
            while IFS= read -r deployment; do
              cdk diff -c deployment_config="$deployment" || true
            done < /tmp/cdk-deployments.txt
          else
            echo "AWS credentials not configured; skipping cdk diff."
          fi

  deploy:
    needs: validate
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.deploy == true &&
      needs.validate.outputs.selected_environment != 'prod'
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ needs.validate.outputs.selected_region }}
      RUNTIME_CONFIG_PATH: ${{ needs.validate.outputs.selected_runtime_config_path }}
      STACK_NAME: ${{ needs.validate.outputs.selected_stack_name }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[aws]"
          python -m pip install -r infra/cdk/requirements.txt

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Determine image tag
        id: image_tag
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_SHA::12}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Render runtime config
        run: |
          mkdir -p "$(dirname "$RUNTIME_CONFIG_PATH")"
          eml_transformer config-render \
            --deployment "${{ inputs.deployment_config }}" \
            --output "$RUNTIME_CONFIG_PATH"

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin \
              "$(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_REGION.amazonaws.com"

      - name: Build and push Docker image
        env:
          IMAGE_TAG: ${{ steps.image_tag.outputs.tag }}
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REPO_URL="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${STACK_NAME}-collection"
          docker build -t "eml-transformer:${IMAGE_TAG}" .
          docker tag "eml-transformer:${IMAGE_TAG}" "${REPO_URL}:${IMAGE_TAG}"
          docker push "${REPO_URL}:${IMAGE_TAG}"
          echo "IMAGE_REF=${REPO_URL}:${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: CDK deploy
        working-directory: infra/cdk
        run: |
          cdk deploy --require-approval never \
            -c deployment_config="${{ inputs.deployment_config }}" \
            -c image_tag="${{ steps.image_tag.outputs.tag }}"

  deploy-prod:
    needs: validate
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.deploy == true &&
      needs.validate.outputs.selected_environment == 'prod'
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ${{ needs.validate.outputs.selected_region }}
      RUNTIME_CONFIG_PATH: ${{ needs.validate.outputs.selected_runtime_config_path }}
      STACK_NAME: ${{ needs.validate.outputs.selected_stack_name }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[aws]"
          python -m pip install -r infra/cdk/requirements.txt

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Determine image tag
        id: image_tag
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_SHA::12}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Render runtime config
        run: |
          mkdir -p "$(dirname "$RUNTIME_CONFIG_PATH")"
          eml_transformer config-render \
            --deployment "${{ inputs.deployment_config }}" \
            --output "$RUNTIME_CONFIG_PATH"

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin \
              "$(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_REGION.amazonaws.com"

      - name: Build and push Docker image
        env:
          IMAGE_TAG: ${{ steps.image_tag.outputs.tag }}
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REPO_URL="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${STACK_NAME}-collection"
          docker build -t "eml-transformer:${IMAGE_TAG}" .
          docker tag "eml-transformer:${IMAGE_TAG}" "${REPO_URL}:${IMAGE_TAG}"
          docker push "${REPO_URL}:${IMAGE_TAG}"

      - name: CDK deploy (production)
        working-directory: infra/cdk
        run: |
          cdk deploy --require-approval never \
            -c deployment_config="${{ inputs.deployment_config }}" \
            -c image_tag="${{ steps.image_tag.outputs.tag }}"
