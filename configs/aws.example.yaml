# Public example only. These fake account/resource values are safe to commit,
# but this file is not an operational deployment config. Generate real runtime
# configs under configs/generated/ from configs/deployments/*.yaml.
#
# --- AWS SSO PROFILE ---
# Set the profile name that matches your ~/.aws/config entry.
# This is used by local CLI commands; containers in AWS use IAM task roles.
# Override at runtime with: AWS_PROFILE=eml-dev eml_transformer <command>
# or via the --profile flag: eml_transformer aws-start-service --profile eml-dev ...
# Leave blank to use the default credential chain.

storage:
  backend: s3
  bucket: eml-transformer-dev-data
  prefix: ""
  region: us-east-1

aws:
  region: us-east-1
  environment: dev
  infra_stack: eml-transformer-dev
  cdk_stack: eml-transformer-dev
  terraform_stack: eml-transformer-dev
  project: eml_transformer
  cloudwatch_namespace: EMLTransformer/Collection
  # profile: eml-dev   # Uncomment and set to your AWS CLI profile name for SSO.

queues:
  url_fetch_queue_url: https://sqs.us-east-1.amazonaws.com/123456789012/eml-transformer-dev-url-fetch

state:
  url_table: eml-transformer-dev-url-state
  run_table: eml-transformer-dev-run-state
  domain_throttle_table: eml-transformer-dev-domain-throttle

orchestration:
  state_machine_arn: arn:aws:states:us-east-1:123456789012:stateMachine:eml-transformer-dev-acquisition
  source_workflow_arn: arn:aws:states:us-east-1:123456789012:stateMachine:eml-transformer-dev-source-workflow
  backfill_workflow_arn: arn:aws:states:us-east-1:123456789012:stateMachine:eml-transformer-dev-backfill-workflow
  batch_job_queue: arn:aws:batch:us-east-1:123456789012:job-queue/eml-transformer-dev-collection
  batch_job_definition: arn:aws:batch:us-east-1:123456789012:job-definition/eml-transformer-dev-ingest
  batch_job_definitions:
    ingest: arn:aws:batch:us-east-1:123456789012:job-definition/eml-transformer-dev-ingest
    standardize: arn:aws:batch:us-east-1:123456789012:job-definition/eml-transformer-dev-standardize
    embed: arn:aws:batch:us-east-1:123456789012:job-definition/eml-transformer-dev-embed
    backfill: arn:aws:batch:us-east-1:123456789012:job-definition/eml-transformer-dev-backfill
    run_all: arn:aws:batch:us-east-1:123456789012:job-definition/eml-transformer-dev-run-all
    gdelt_discovery: arn:aws:batch:us-east-1:123456789012:job-definition/eml-transformer-dev-gdelt-discovery
    url_fetch_worker: arn:aws:batch:us-east-1:123456789012:job-definition/eml-transformer-dev-url-fetch-worker
    s3_restore_operator: arn:aws:batch:us-east-1:123456789012:job-definition/eml-transformer-dev-s3-restore-operator

paths:
  root: .

sources:
  iem_afos:
    enabled: true
  newsapi:
    enabled: true
    api_key_env: NEWSAPI_KEY
    query: >
      (
        "Midcontinent Independent System Operator"
        OR ERCOT
        OR PJM
      )
      AND
      (
        electricity
        OR grid
        OR "power market"
        OR transmission
      )
    language: en
    page_size: 100
  miso_notifications:
    enabled: true
  weather_alerts:
    enabled: true
    areas:
      - IN
      - IL
      - MI
      - OH
      - KY
      - WI
      - MN
      - IA
      - MO
      - AR
      - LA
      - MS
      - ND
      - SD

embeddings:
  provider: sentence_transformer
  model: nvidia/llama-nemotron-embed-vl-1b-v2
  batch_size: 16
  device: cpu
  normalize_embeddings: true
  trust_remote_code: true
  text_columns:
    - title
    - text
