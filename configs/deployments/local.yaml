# Final deployment layer for local runs.
# Merge order: base -> this file.
# Values in this file override earlier layers.

# Selects the base profile this deployment composes.
deployment:
  name: local
  base: configs/local.yaml

# Overrides local base profile identity from configs/local.yaml.
infra:
  engine: local
  stack_name: eml-transformer-local
  account_id: null
  region: local
  environment: dev

# Direct local CLI identity; no AWS resources are created.
aws:
  region: local
  environment: dev
  infra_stack: eml-transformer-local
  cdk_stack: null
  project: eml_transformer
  cloudwatch_namespace: EMLTransformer/Collection

# Resets shared environment cost/log values; local runs do not create AWS budgets.
cost:
  monthly_budget_usd: 0
  alert_emails: []
  log_retention_days: 0
  allow_nat_gateway: false
  max_batch_vcpus: 0
  ecr_retain_images: 0
