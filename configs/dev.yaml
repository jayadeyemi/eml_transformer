storage:
  backend: local
  base_dir: data

# Local compatibility config for direct development commands.
# Deployed AWS runs should use layered configs/deployments/*.yaml plus
# ignored generated runtime configs under configs/generated/.

aws:
  region: us-east-1
  environment: dev
  infra_stack: eml-transformer-dev
  cdk_stack: eml-transformer-dev
  project: eml_transformer
  cloudwatch_namespace: EMLTransformer/Collection

queues:
  # Filled from infrastructure outputs or URL_FETCH_QUEUE_URL in AWS runs.
  url_fetch_queue_url: null

state:
  # Filled from infrastructure outputs or URL_STATE_TABLE / RUN_STATE_TABLE.
  url_table: null
  run_table: null
  domain_throttle_table: null

orchestration:
  # Use Step Functions for workflows; use Batch for individual microservices.
  state_machine_arn: null
  source_workflow_arn: null
  backfill_workflow_arn: null
  batch_job_queue: null
  batch_job_definitions:
    ingest: null
    standardize: null
    embed: null
    backfill: null
    run_all: null
    gdelt_discovery: null
    url_fetch_worker: null
    s3_restore_operator: null

paths:
  root: .

sources:
  iem_afos:
      enabled: true

      # Optional:
      # If provided, only fetch this exact PIL
      # Example: AFDIND
      pil: null

      # Weather Forecast Offices
      wfos:
        - IND
        - IWX
        - LOT
        - ILX
        - LSX
        - DVN
        - DMX

      # Product types
      product_types:
        - AFD
        - HWO
        - NPW
        - WSW
        - LSR
        - SPS

      # API settings
      limit: 100
      fmt: text
      timeout: 30

  newsapi:
  
    enabled: true
    api_key_env: NEWSAPI_KEY
    query: >
      (
        "Midcontinent Independent System Operator"
        OR ERCOT
        OR PJM
      )
      AND
      (
        electricity
        OR grid
        OR "power market"
        OR transmission
      )
    language: en
    page_size: 100

  miso_notifications:
    enabled: true

  weather_alerts:
    enabled: true
    areas: 
      ["IN", "IL", "MI", "OH", "KY",
      "WI", "MN", "IA", "MO", "AR",
      "LA", "MS", "ND", "SD"]

embeddings:
  provider: sentence_transformer
  model: nvidia/llama-nemotron-embed-vl-1b-v2
  batch_size: 16
  device: cuda
  normalize_embeddings: true
  trust_remote_code: true
  text_columns:
    - title
    - text
