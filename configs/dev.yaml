storage:
  backend: local
  base_dir: data

paths:
  root: .

sources:
  iem_afos:
      enabled: true

      # Optional:
      # If provided, only fetch this exact PIL
      # Example: AFDIND
      pil: null

      # Weather Forecast Offices
      wfos:
        - IND
        - IWX
        - LOT
        - ILX
        - LSX
        - DVN
        - DMX

      # Product types
      product_types:
        - AFD
        - HWO
        - NPW
        - WSW
        - LSR
        - SPS

      # API settings
      limit: 100
      fmt: text
      timeout: 30

  newsapi:
  
    enabled: true
    api_key_env: NEWSAPI_KEY
    query: >
      (
        "Midcontinent Independent System Operator"
        OR ERCOT
        OR PJM
      )
      AND
      (
        electricity
        OR grid
        OR "power market"
        OR transmission
      )
    language: en
    page_size: 100

  miso_notifications:
    enabled: true

  weather_alerts:
    enabled: true
    areas: 
      ["IN", "IL", "MI", "OH", "KY",
      "WI", "MN", "IA", "MO", "AR",
      "LA", "MS", "ND", "SD"]

embeddings:
  provider: sentence_transformer
  model: nvidia/llama-nemotron-embed-vl-1b-v2
  batch_size: 16
  device: cuda
  normalize_embeddings: true
  trust_remote_code: true
  text_columns:
    - title
    - text